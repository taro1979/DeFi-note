<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>時系列年表 - DeFi History Atlas</title>
  <link rel="stylesheet" href="assets/site.css">
</head>
<body class="page-timeline">
  <header class="site-header">
    <div class="wrap topbar">
      <a class="brand" href="index.html">DeFi History Atlas</a>
      <nav class="nav"><a href="index.html">概要</a><a class="active" href="timeline.html">年表</a><a href="categories.html">カテゴリ</a><a href="protocols.html">プロトコル</a><a href="underworld.html">Rug事例</a><a href="deep-research.html">深掘り</a><a href="research-method.html">調査方法</a><a href="sources.html">出典</a></nav>
    </div>
  </header>
  <main class="wrap">
      <section aria-labelledby="timelineTitle">
      <div class="section-title">
        <h2 id="timelineTitle">時系列年表</h2>
        <p><span id="timelineCountText">170件超</span>のプロトコル/事件を、分野、深さ、状態、チェーン/市場で複数選択できる。同じグループ内はOR、グループ間はAND。まずはCore/Major/Incident、次にNicheやDegenを足すと読みやすい。</p>
      </div>
      <div class="timeline-layout" id="timelineLayout">
        <aside class="filter-sidebar" id="filterSidebar" aria-label="timeline controls">
          <div class="filter-head">
            <b>フィルター</b>
            <button type="button" id="filterToggle" aria-expanded="true" aria-controls="filterSidebar">閉じる</button>
          </div>
          <div class="controls">
            <div class="filter-panel">
              <div class="control-row">
                <div class="filter-group">
                  <span class="filter-title">分野</span>
                  <div class="filters" id="filters"></div>
                </div>
                <input id="search" type="search" placeholder="例: Rug, rug, BSC, OHM fork">
              </div>
              <div class="filter-group">
                <span class="filter-title">深さ / 重要度</span>
                <div class="filters" id="depthFilters"></div>
              </div>
              <div class="filter-group">
                <span class="filter-title">状態</span>
                <div class="filters" id="statusFilters"></div>
              </div>
              <div class="filter-group">
                <span class="filter-title">チェーン / 市場</span>
                <div class="filters" id="chainFilters"></div>
              </div>
            </div>
            <div class="years" id="yearNav"></div>
          </div>
        </aside>
        <div class="timeline-main">
          <button type="button" class="filter-open" id="filterOpen" aria-expanded="false" aria-controls="filterSidebar">フィルターを開く</button>
          <div class="empty" id="empty">該当する項目がありません。</div>
          <div class="timeline" id="timeline"></div>
        </div>
      </div>
    </section>
    </main>
  <footer><div class="wrap">作成目的: DeFiプロトコル進化の調査・参照用。日付とステータスは市場やドキュメント更新で変わる可能性がある。</div></footer>
  <script src="assets/defi-data.js"></script>
  <script src="assets/site.js"></script>
</body>
</html>
